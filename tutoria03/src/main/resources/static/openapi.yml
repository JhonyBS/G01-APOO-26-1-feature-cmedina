openapi: 3.0.3

info:
  title: API Estudiantes y Docentes
  description: API REST para la gestión de estudiantes y docentes
  version: 1.0.0
  contact:
    name: Joan Diaz, Juan Cardenas

servers:
  - url: http://localhost:8080
    description: Servidor de desarrollo local

tags:
  - name: Estudiantes
    description: Operaciones relacionadas con estudiantes

  - name: Docentes
    description: Operaciones relacionadas con docentes

paths:

  /estudiantes:
    get:
      tags:
        - Estudiantes
      summary: Obtener todos los estudiantes
      operationId: getAllStudents
      responses:
        '200':
          description: Lista de estudiantes obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Estudiante'

    post:
      tags:
        - Estudiantes
      summary: Crear un estudiante
      operationId: createStudent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EstudianteRequest'
      responses:
        '201':
          description: Estudiante creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Estudiante'
        '409':
          description: Ya existe un estudiante con ese correo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /estudiantes/{id}:
    get:
      tags:
        - Estudiantes
      summary: Obtener estudiante por ID
      operationId: getStudentById
      parameters:
        - $ref: '#/components/parameters/IdParameter'
      responses:
        '200':
          description: Estudiante encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Estudiante'
        '404':
          description: Estudiante no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Estudiantes
      summary: Actualizar estudiante
      operationId: updateStudent
      parameters:
        - $ref: '#/components/parameters/IdParameter'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EstudianteRequest'
      responses:
        '200':
          description: Estudiante actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Estudiante'
        '404':
          description: Estudiante no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Estudiantes
      summary: Eliminar estudiante
      operationId: deleteStudent
      parameters:
        - $ref: '#/components/parameters/IdParameter'
      responses:
        '204':
          description: Estudiante eliminado exitosamente
        '404':
          description: Estudiante no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /docentes:
    get:
      tags:
        - Docentes
      summary: Obtener todos los docentes
      operationId: getAllTeachers
      responses:
        '200':
          description: Lista de docentes obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Docente'

    post:
      tags:
        - Docentes
      summary: Crear docente
      operationId: createTeacher
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocenteRequest'
      responses:
        '201':
          description: Docente creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Docente'
        '409':
          description: Ya existe un docente con ese correo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /docentes/{id}:
    get:
      tags:
        - Docentes
      summary: Obtener docente por ID
      operationId: getTeacherById
      parameters:
        - $ref: '#/components/parameters/IdParameter'
      responses:
        '200':
          description: Docente encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Docente'
        '404':
          description: Docente no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Docentes
      summary: Actualizar docente
      operationId: updateTeacher
      parameters:
        - $ref: '#/components/parameters/IdParameter'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocenteRequest'
      responses:
        '200':
          description: Docente actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Docente'
        '404':
          description: Docente no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Docentes
      summary: Eliminar docente
      operationId: deleteTeacher
      parameters:
        - $ref: '#/components/parameters/IdParameter'
      responses:
        '204':
          description: Docente eliminado exitosamente
        '404':
          description: Docente no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:

  parameters:
    IdParameter:
      name: id
      in: path
      required: true
      description: Identificador único
      schema:
        type: integer
        example: 1

  schemas:

    Persona:
      type: object
      properties:
        nombres:
          type: string
          maxLength: 50
        correo:
          type: string
          format: email
          maxLength: 50
        numeroTelefono:
          type: string
          maxLength: 30
        carrera:
          type: string
          maxLength: 60
        direccion:
          type: string
          maxLength: 70

    Estudiante:
      allOf:
        - $ref: '#/components/schemas/Persona'
        - type: object
          properties:
            id:
              type: integer
              readOnly: true
            semestre:
              type: string
              maxLength: 50
            activo:
              type: boolean

    EstudianteRequest:
      allOf:
        - $ref: '#/components/schemas/Persona'
        - type: object
          properties:
            semestre:
              type: string
              maxLength: 50
            activo:
              type: boolean
          required:
            - nombres
            - correo
            - numeroTelefono
            - carrera
            - direccion
            - semestre
            - activo

    Docente:
      allOf:
        - $ref: '#/components/schemas/Persona'
        - type: object
          properties:
            id:
              type: integer
              readOnly: true
            numeroDocumento:
              type: string
              maxLength: 30
            tipoDocumento:
              type: string
              maxLength: 10

    DocenteRequest:
      allOf:
        - $ref: '#/components/schemas/Persona'
        - type: object
          properties:
            numeroDocumento:
              type: string
              maxLength: 30
            tipoDocumento:
              type: string
              maxLength: 10
          required:
            - nombres
            - correo
            - numeroDocumento
            - tipoDocumento
            - numeroTelefono
            - carrera
            - direccion

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string







